<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeguimientoVehiculos — Rutas y Entregas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="app-header">
    <a href="../index.html" style="color:inherit;text-decoration:none;opacity:.7;font-size:.85rem;white-space:nowrap;margin-right:var(--space-md)">← Volver</a>
    <div class="app-header__brand">
      <span class="app-header__brand-icon">🚛</span>
      <span>Seguimiento Vehículos</span>
    </div>
  </header>

  <nav class="app-tabs">
    <button class="app-tab" data-tab="dashboard">📊 Dashboard</button>
    <button class="app-tab" data-tab="mapa">🗺️ Mapa</button>
    <button class="app-tab" data-tab="visitas">📋 Visitas</button>
    <button class="app-tab" data-tab="config">⚙️ Config</button>
  </nav>

  <main>
    <!-- DASHBOARD -->
    <section class="app-view app-view--active" id="dashboard-view">
      <div class="dashboard-summary" id="dashboard-summary"></div>
      <div class="mapa-legend" style="background:var(--color-surface);padding:var(--space-md);border-radius:var(--radius-lg);box-shadow:0 1px 4px var(--color-shadow)">
        <span class="mapa-legend__item">
          <span class="mapa-legend__dot mapa-legend__dot--entregado"></span> Entregado
        </span>
        <span class="mapa-legend__item">
          <span class="mapa-legend__dot mapa-legend__dot--no-entregado"></span> No entregado
        </span>
        <span class="mapa-legend__item">
          <span class="mapa-legend__dot mapa-legend__dot--sin-visita"></span> Sin visita
        </span>
      </div>
    </section>

    <!-- MAPA -->
    <section class="app-view" id="mapa-view">
      <div class="mapa-toolbar">
        <div style="display:flex;gap:var(--space-sm);align-items:center;flex-wrap:wrap">
          <label class="form-label" for="mapa-fecha" style="margin-bottom:0;white-space:nowrap">Fecha:</label>
          <input type="date" class="form-input" id="mapa-fecha" style="width:auto">
          <label class="form-label" for="mapa-placa" style="margin-bottom:0;white-space:nowrap">Vehículo:</label>
          <select class="form-select" id="mapa-placa" style="width:auto;min-width:180px"></select>
        </div>
        <div style="display:flex;gap:var(--space-sm)">
          <button class="btn btn--primary btn--sm" id="mapa-filtrar">🔍 Filtrar</button>
          <button class="btn btn--secondary btn--sm" id="mapa-limpiar">✕ Limpiar</button>
        </div>
      </div>
      <div class="mapa-container" id="mapa-leaflet"></div>
      <div class="mapa-legend">
        <span class="mapa-legend__item">
          <span class="mapa-legend__dot mapa-legend__dot--entregado"></span> Entregado
        </span>
        <span class="mapa-legend__item">
          <span class="mapa-legend__dot mapa-legend__dot--no-entregado"></span> No entregado
        </span>
        <span class="mapa-legend__item">
          <span class="mapa-legend__dot mapa-legend__dot--sin-visita"></span> Sin visita
        </span>
      </div>
    </section>

    <!-- VISITAS -->
    <section class="app-view" id="visitas-view">
      <div class="visitas-toolbar">
        <span style="font-weight:600">Registro de visitas</span>
        <button class="btn btn--primary" id="btn-nueva-visita">➕ Nueva Visita</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Vehículo</th>
              <th>Punto de Venta</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Estado</th>
              <th>Valor</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="visitas-body"></tbody>
        </table>
      </div>
    </section>

    <!-- CONFIG -->
    <section class="app-view" id="config-view">
      <div class="config-panels">
        <div class="config-panel">
          <div class="config-panel__title">🚛 Vehículos</div>
          <div class="config-panel__form">
            <input class="form-input" type="text" id="veh-placa" placeholder="Placa" style="min-width:80px">
            <input class="form-input" type="text" id="veh-conductor" placeholder="Conductor" style="min-width:120px">
            <input class="form-input" type="text" id="veh-marca" placeholder="Marca" style="min-width:80px">
            <input class="form-input" type="text" id="veh-modelo" placeholder="Modelo" style="min-width:80px">
            <input class="form-input" type="number" id="veh-anio" placeholder="Año" style="min-width:70px">
            <button class="btn btn--primary btn--sm" id="btn-agregar-vehiculo">+ Agregar</button>
          </div>
          <div id="vehiculos-list"></div>
        </div>

        <div class="config-panel">
          <div class="config-panel__title">📍 Puntos de Venta</div>
          <div class="config-panel__form">
            <input class="form-input" type="text" id="pto-nombre" placeholder="Nombre" style="min-width:140px">
            <input class="form-input" type="text" id="pto-direccion" placeholder="Dirección" style="min-width:140px">
          </div>
          <div class="config-panel__form">
            <input class="form-input" type="number" step="any" id="pto-lat" placeholder="Latitud" style="min-width:90px">
            <input class="form-input" type="number" step="any" id="pto-lng" placeholder="Longitud" style="min-width:90px">
            <select class="form-select" id="pto-tipo" style="width:auto;min-width:120px">
              <option value="supermercado">Supermercado</option>
              <option value="minimarket">Minimarket</option>
              <option value="almacen">Almacén</option>
              <option value="botilleria">Botillería</option>
              <option value="restaurante">Restaurante</option>
              <option value="otro">Otro</option>
            </select>
            <button class="btn btn--primary btn--sm" id="btn-agregar-punto">+ Agregar</button>
          </div>
          <div id="puntos-list"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL VISITA -->
  <div class="modal-overlay" id="visita-modal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="visita-modal-title">Nueva Visita</h2>
        <button class="btn btn--secondary btn--sm" id="btn-cancelar-visita">✕</button>
      </div>
      <form class="modal__body" id="visita-form">
        <input type="hidden" id="visita-id">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="visita-vehiculo">Vehículo *</label>
            <select class="form-select" id="visita-vehiculo" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="visita-fecha">Fecha *</label>
            <input class="form-input" type="date" id="visita-fecha" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="visita-punto">Punto de Venta *</label>
          <select class="form-select" id="visita-punto" required></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="visita-producto">Productos entregados</label>
          <input class="form-input" type="text" id="visita-producto" placeholder="Ej: Coca-Cola 2L x12, Sprite 1.5L x6">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="visita-cantidad">Cantidad (unidades)</label>
            <input class="form-input" type="number" id="visita-cantidad" min="0" value="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="visita-valor">Valor ($)</label>
            <input class="form-input" type="number" id="visita-valor" min="0" value="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="visita-entregado">¿Entregado?</label>
            <select class="form-select" id="visita-entregado">
              <option value="1">Sí, entregado</option>
              <option value="0">No entregado</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="visita-hora">Hora</label>
            <input class="form-input" type="time" id="visita-hora">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="visita-observaciones">Observaciones</label>
          <textarea class="form-textarea" id="visita-observaciones" placeholder="Motivo de no entrega, novedades..." maxlength="300"></textarea>
        </div>
        <div class="modal__footer" style="padding:var(--space-md) 0 0">
          <button type="button" class="btn btn--secondary" id="btn-cancelar-visita2">Cancelar</button>
          <button type="submit" class="btn btn--primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/models.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/config.js"></script>
  <script src="js/visitas.js"></script>
  <script src="js/mapa.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
